// Click node to highlight connections
let highlightedNode=null;
function highlightConnections(event,d){
  highlightedNode=d.id;
  const connected=new Set([d.id]);
  linksData.forEach(l=>{
    const s=l.source.id||l.source, t=l.target.id||l.target;
    if(s===d.id)connected.add(t);if(t===d.id)connected.add(s);
  });
  node.selectAll("circle").transition().duration(300).attr("opacity",nd=>connected.has(nd.id)?1:0.08);
  node.selectAll("text").transition().duration(300).attr("opacity",nd=>connected.has(nd.id)?1:0.08);
  link.transition().duration(300)
    .attr("stroke-opacity",l=>{const s=l.source.id||l.source, t=l.target.id||l.target;return(connected.has(s)&&connected.has(t))?0.9:0.03;})
    .attr("stroke-width",l=>{const s=l.source.id||l.source, t=l.target.id||l.target;return(connected.has(s)&&connected.has(t))?3:0.5;});
  ll.transition().duration(300).attr("opacity",l=>{const s=l.source.id||l.source, t=l.target.id||l.target;return(connected.has(s)&&connected.has(t))?1:0;});
  event.stopPropagation();
}
function resetHighlight(){
  highlightedNode=null;
  node.selectAll("circle").transition().duration(300).attr("opacity",1);
  node.selectAll("text").transition().duration(300).attr("opacity",1);
  link.transition().duration(300).attr("stroke-opacity",0.6).attr("stroke-width",1.5);
  ll.transition().duration(300).attr("opacity",0.7);
}
</script>
