.on("mouseover",(e,d)=>{const tt=d3.select("#tooltip");tt.classed("show",true).style("left",(e.pageX+15)+"px").style("top",(e.pageY-10)+"px").html('<div class="tt-title">'+d.label+' '+d.title+'</div><div class="tt-row"><span class="tt-label">类型</span><span>'+d.type+'</span></div>'+(d.cas?'<div class="tt-row"><span class="tt-label">CAS</span><span>'+d.cas+'</span></div>':'')+(d.formula?'<div class="tt-row"><span class="tt-label">分子式</span><span>'+d.formula+'</span></div>':'')+(d.mw?'<div class="tt-row"><span class="tt-label">分子量</span><span>'+d.mw+'</span></div>':'')+(d.conversion?'<div class="tt-row"><span class="tt-label">转化率</span><span>'+d.conversion+'</span></div>':'')+(d.capacity?'<div class="tt-row"><span class="tt-label">产能</span><span>'+d.capacity+'</span></div>':'')+(d.cert?'<div class="tt-row"><span class="tt-label">认证</span><span>'+d.cert+'</span></div>':'')+(d.certification?'<div class="tt-row"><span class="tt-label">资质</span><span>'+d.certification+'</span></div>':'')+(d.status?'<div class="tt-row"><span class="tt-label">状态</span><span>'+d.status+'</span></div>':'')+(d.desc?'<div style="margin-top:6px;color:#ccc">'+d.desc+'</div>':''))}).on("mouseout",()=>d3.select("#tooltip").classed("show",false));
function highlightConnected(e,d){e.stopPropagation();const c=new Set([d.id]);linksData.forEach(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;if(s===d.id)c.add(t);if(t===d.id)c.add(s)});node.selectAll("circle").transition().duration(300).attr("opacity",nd=>c.has(nd.id)?1:0.04);node.selectAll("text").transition().duration(300).attr("opacity",nd=>c.has(nd.id)?1:0.04);link.transition().duration(300).attr("stroke-opacity",l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(c.has(s)&&c.has(t))?0.9:0.02}).attr("stroke-width",l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(c.has(s)&&c.has(t))?3:0.5});}
node.selectAll("circle").on("click",highlightConnected);
node.append("text").text(d=>d.label).attr("font-size",d=>d.type==="API"?9:d.type==="Supplier"?8:d.type==="DI"?7:7.5).attr("font-family","Microsoft YaHei,sans-serif").attr("dx",16).attr("dy",4).attr("fill","#333").style("pointer-events","none");
const ll=g.append("g").selectAll("text").data(linksData).join("text").text(d=>d.relationship).attr("font-size",5.5).attr("fill","#aaa").attr("text-anchor","middle").attr("dy",-4).style("pointer-events","none");
sim.on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);node.attr("transform",d=>`translate(${d.x},${d.y})`);ll.attr("x",d=>(d.source.x+d.target.x)/2).attr("y",d=>(d.source.y+d.target.y)/2)});
function resetZoom(){svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity)}
function resetHighlight(){node.selectAll("circle").transition().duration(300).attr("opacity",1);node.selectAll("text").transition().duration(300).attr("opacity",1);link.transition().duration(300).attr("stroke-opacity",0.4).attr("stroke-width",1.2);ll.transition().duration(300).attr("opacity",0.7)}
function restoreAll(){resetZoom();resetHighlight()}
function filterType(t){node.selectAll("circle").transition().duration(300).attr("opacity",d=>d.type===t?1:0.04);node.selectAll("text").transition().duration(300).attr("opacity",d=>d.type===t?1:0.04);link.transition().duration(300).attr("stroke-opacity",0.03);ll.transition().duration(300).attr("opacity",0.03)}
document.addEventListener('click',function(e){if(e.target.tagName==='svg'||e.target.tagName==='body'||e.target.id==='graph')restoreAll()});
</script></body></html>
