<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API-KG Q&A — 原料药知识图谱智能问答</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#f8fafc;display:flex;flex-direction:column;height:100vh}
header{background:linear-gradient(135deg,#0f172a,#1e3a5f);color:white;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:1.1rem}
header .status{font-size:.75rem;opacity:.7;margin-left:auto}
header .status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;margin-right:6px}
header .status .dot.online{background:#10b981}
.main{flex:1;display:flex;overflow:hidden}
.chat-panel{flex:1;display:flex;flex-direction:column;max-width:800px;margin:0 auto;width:100%}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:.9rem;line-height:1.6;animation:fadeIn .3s}
.msg.user{align-self:flex-end;background:#3b82f6;color:white;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:white;border:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(0,0,0,.05);border-bottom-left-radius:4px}
.msg .source{font-size:.72rem;color:#94a3b8;margin-top:8px;padding-top:6px;border-top:1px solid #e2e8f0}
.msg .source a{color:#3b82f6;margin:0 4px}
.msg .entities{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.msg .ent{font-size:.68rem;padding:2px 8px;border-radius:8px;background:#eff6ff;color:#1e40af}
.msg.loading{opacity:.7}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.typing .dots{display:inline-flex;gap:3px}
.msg.typing .dots span{width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:bounce 1.4s infinite}
.msg.typing .dots span:nth-child(2){animation-delay:.15s}
.msg.typing .dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.input-bar{display:flex;gap:8px;padding:16px 20px;background:white;border-top:1px solid #e2e8f0;flex-shrink:0}
.input-bar input{flex:1;padding:10px 16px;border:1px solid #cbd5e1;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit}
.input-bar input:focus{border-color:#3b82f6}
.input-bar button{padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600}
.input-bar button:hover{background:#2563eb}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:12px 20px;flex-shrink:0}
.suggestions button{font-size:.78rem;padding:6px 14px;border:1px solid #cbd5e1;border-radius:16px;background:white;cursor:pointer;color:#475569;transition:all .2s}
.suggestions button:hover{border-color:#3b82f6;color:#3b82f6}
.sidebar{width:260px;background:white;border-left:1px solid #e2e8f0;padding:16px;overflow-y:auto;flex-shrink:0}
.sidebar h3{font-size:.85rem;color:#475569;margin-bottom:12px}
.kg-card{background:#f8fafc;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:.78rem}
.kg-card .name{font-weight:600;color:#1e293b}
.kg-card .meta{color:#94a3b8;font-size:.7rem;margin-top:2px}
.config-bar{padding:8px 20px;background:#f8fafc;font-size:.75rem;display:flex;gap:16px;align-items:center;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.config-bar input{width:260px;padding:4px 8px;border:1px solid #cbd5e1;border-radius:4px;font-size:.75rem}
.config-bar label{color:#64748b}
</style>
</head>
<body>
<header>
  <h1>🧬 API-KG Q&A 原料药知识图谱智能问答</h1>
  <a href="./api-kg-portal.html" style="color:#60a5fa;font-size:.8rem;text-decoration:none">📊 图谱门户</a>
  <span class="status"><span class="dot" id="statusDot"></span><span id="statusText">连接中...</span></span>
</header>

<div class="config-bar">
  <label>后端地址:</label>
  <input id="apiBase" value="http://localhost:8000" onchange="checkHealth()">
  <span style="color:#94a3b8">默认 localhost:8000</span>
</div>

<div class="main">
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="msg assistant">
        你好！我是原料药知识图谱智能助手。<br>
        覆盖 <b>头孢菌素 · 培南类 · 他汀类 · ARB沙坦 · 喹诺酮 · HIV抗病毒 · 喹诺酮进化</b> 7大图谱。<br>
        可以问我供应链、合成路线、供应商产能、FDA/EDQM资质等任何问题。
      </div>
    </div>
    <div class="suggestions" id="suggestions">
      <button onclick="askSuggestion(this)">美罗培南的4-AA中间体有哪些供应商？</button>
      <button onclick="askSuggestion(this)">他汀类药物的共用中间体是什么？</button>
      <button onclick="askSuggestion(this)">左氧氟沙星的合成路线</button>
      <button onclick="askSuggestion(this)">环丙沙星最大的供应商是谁？</button>
      <button onclick="askSuggestion(this)">依非韦伦在泰国的价格为何特别低？</button>
      <button onclick="askSuggestion(this)">喹诺酮从第1代到第5代的关键结构变化</button>
    </div>
    <div class="input-bar">
      <input id="questionInput" placeholder="输入问题，例如: 培南类4-AA的供应商和产能？" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">发送</button>
    </div>
  </div>
  <div class="sidebar">
    <h3>📚 可用知识图谱</h3>
    <div id="kgList">加载中...</div>
  </div>
</div>

<script>
const API_KEY = 'http://localhost:8000';
let apiBase = document.getElementById('apiBase').value;

function api(path) { return apiBase + path; }

async function checkHealth() {
  apiBase = document.getElementById('apiBase').value;
  try {
    const r = await fetch(api('/api/health'));
    const d = await r.json();
    document.getElementById('statusDot').classList.toggle('online', d.status==='ok');
    document.getElementById('statusText').textContent = d.indexed ? '在线(已索引)' : '在线(待索引)';
  } catch(e) {
    document.getElementById('statusDot').classList.remove('online');
    document.getElementById('statusText').textContent = '离线';
  }
}

async function loadKgList() {
  try {
    const r = await fetch(api('/api/kg/list'));
    const d = await r.json();
    const container = document.getElementById('kgList');
    container.innerHTML = Object.entries(d.knowledge_graphs).map(([name,meta]) =>
      `<div class="kg-card">
        <div class="name">${name}</div>
        <div class="meta">${meta.entities}节点 · ${meta.relationships}边 · ${meta.apis}API</div>
      </div>`
    ).join('');
  } catch(e) {
    document.getElementById('kgList').innerHTML = '<span style="color:#94a3b8">后端未连接</span>';
  }
}

function addMessage(role, content, meta) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = content.replace(/\n/g,'<br>');
  if (meta && meta.sources && meta.sources.length) {
    const srcs = meta.sources.map(s => `<a href="#">${s}</a>`).join(', ');
    div.innerHTML += `<div class="source">来源: ${srcs}</div>`;
  }
  if (meta && meta.entities_mentioned && meta.entities_mentioned.length) {
    div.innerHTML += `<div class="entities">${meta.entities_mentioned.map(e =>
      `<span class="ent">${e}</span>`).join('')}</div>`;
  }
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg assistant typing';
  div.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
  div.id = 'typingIndicator';
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
  return div;
}

async function send() {
  const input = document.getElementById('questionInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  addMessage('user', q);
  const typing = addTyping();

  try {
    const r = await fetch(api('/api/query'), {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question: q, method: 'local'})
    });
    typing.remove();
    if (r.ok) {
      const d = await r.json();
      addMessage('assistant', d.answer, d);
    } else {
      const err = await r.text();
      addMessage('assistant', '查询出错: ' + err.substring(0,200));
    }
  } catch(e) {
    typing.remove();
    addMessage('assistant', '无法连接后端服务 (请确认 FastAPI 已启动在 ' + apiBase + ')');
  }
}

function askSuggestion(btn) {
  document.getElementById('questionInput').value = btn.textContent;
  send();
}

checkHealth();
loadKgList();
</script>
</body>
</html>
