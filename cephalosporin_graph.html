let svg = d3.select("#graph"),
    width = window.innerWidth,
    height = window.innerHeight;

const g = svg.append("g");

// Zoom
const zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (event) => g.attr("transform", event.transform));
svg.call(zoom);

// Force simulation
const simulation = d3.forceSimulation(nodesData)
    .force("link", d3.forceLink(linksData).id(d => d.id).distance(120))
    .force("charge", d3.forceManyBody().strength(-400))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide(30));

// Arrow markers
const defs = svg.append("defs");
linksData.forEach((l, i) => {
    defs.append("marker")
        .attr("id", "arrow-" + i)
        .attr("viewBox", "0 -5 10 10")
        .attr("refX", 22)
        .attr("refY", 0)
        .attr("markerWidth", 6)
        .attr("markerHeight", 6)
        .attr("orient", "auto")
        .append("path")
        .attr("d", "M0,-5L10,0L0,5")
        .attr("fill", l.color);
});

// Links
const link = g.append("g").selectAll("line")
    .data(linksData).join("line")
    .attr("stroke", d => d.color)
    .attr("stroke-width", 1.5)
    .attr("stroke-opacity", 0.6)
    .attr("marker-end", (d, i) => "url(#arrow-" + i + ")");

// Nodes
const node = g.append("g").selectAll("g")
    .data(nodesData).join("g")
    .call(d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended));

// Drug nodes = larger
node.append("circle")
    .attr("r", d => d.type === "Drug" ? 14 : d.type === "Generation" ? 18 : d.type === "Core Intermediate" ? 11 : 8)
    .attr("fill", d => d.color)
    .attr("stroke", "#fff")
    .attr("stroke-width", 1.5)
    .style("cursor", "pointer")
    .on("click", (event, d) => { highlightConnected(event, d); showDetail(d); })
    .on("mouseover", showTooltip)
    .on("mouseout", hideTooltip);

// Node labels
node.append("text")
    .text(d => d.label.split("\n")[0])
    .attr("font-size", d => d.type === "Generation" ? 13 : d.type === "Drug" ? 10 : 9)

    .attr("dx", 18)
    .attr("dy", 4)
    .attr("fill", "#333")
    .style("pointer-events", "none");

    .text(d => {

        return parts.length > 1 ? parts[1] : "";

simulation.on("tick", () => {

        .attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
    linkLabel.attr("x", d => (d.source.x + d.target.x) / 2)
        .attr("y", d => (d.source.y + d.target.y) / 2);
});

// Drag functions
function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

// Tooltip
const tooltip = d3.select("#tooltip");
function showTooltip(event, d) {
    tooltip.classed("visible", true)
        .style("left", (event.pageX + 15) + "px")
        .style("top", (event.pageY - 10) + "px")
        .html(`<div class="tt-title">${d.label.replace(/\n/g, " ")}</div>
               <div class="tt-row"><span class="tt-label">类型</span><span>${d.type}</span></div>
               ${d.cas ? `<div class="tt-row"><span class="tt-label">CAS</span><span>${d.cas}</span></div>` : ""}
               ${d.formula ? `<div class="tt-row"><span class="tt-label">分子式</span><span>${d.formula}</span></div>` : ""}
               ${d.mw ? `<div class="tt-row"><span class="tt-label">分子量</span><span>${d.mw}</span></div>` : ""}
               ${d.year ? `<div class="tt-row"><span class="tt-label">上市年份</span><span>${d.year}</span></div>` : ""}
               ${d.gen ? `<div class="tt-row"><span class="tt-label">代际</span><span>第${d.gen}代</span></div>` : ""}
               ${d.desc ? `<div style="margin-top:6px;color:#ccc;">${d.desc}</div>` : ""}`);
}
function hideTooltip() { tooltip.classed("visible", false); }

function showDetail(d) {
    if (d.type === "Drug" && d.smiles) {
        alert(d.label + "\n\n分子式: " + d.formula + "\n分子量: " + d.mw + "\nSMILES: " + d.smiles);
    }
}

function resetZoom() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity); }

function filterGen(gen) {
    if (gen === 'all') {
        node.selectAll("circle").attr("opacity", 1);
        link.attr("opacity", 0.6);
        node.selectAll("text").attr("opacity", 1);
        linkLabel.attr("opacity", 0.7);
    } else {
        const genId = "GEN_" + gen;
        node.selectAll("circle").attr("opacity", d => {
            if (d.type === "Generation" && d.id === genId) return 1;
            if (d.type === "Core Intermediate" || d.type === "Starting Material" || d.type === "Side Chain Acid") return 0.3;
            return 0.3;
        });
        link.attr("opacity", 0.3);
        linkLabel.attr("opacity", 0.3);
        node.selectAll("text").attr("opacity", d => d.type === "Generation" && d.id === genId ? 1 : 0.3);
        // Highlight connected drug nodes
        const connectedDrugs = new Set();
        linksData.forEach(l => { if (l.target === genId && nodesData.find(n => n.id === l.source && n.type === "Drug")) connectedDrugs.add(l.source); });
        node.selectAll("circle").attr("opacity", d => connectedDrugs.has(d.id) ? 1 : 
            (d.id === genId ? 1 : (d.type === "Core Intermediate" || d.type === "Starting Material" || d.type === "Side Chain Acid") ? 0.3 : 0.15));
    }
}

function highlightIntermediates() {
    node.selectAll("circle").attr("opacity", d => 
        d.type === "Core Intermediate" || d.type === "Starting Material" ? 1 : 0.15);
    link.attr("opacity", 0.2);
    linkLabel.attr("opacity", 0.2);
}

// Click node to highlight connected subgraph
function highlightConnected(event, d) {
    event.stopPropagation();
    const connected = new Set([d.id]);
    linksData.forEach(l => {
        const s = l.source.id || l.source, t = l.target.id || l.target;
        if (s === d.id) connected.add(t);
        if (t === d.id) connected.add(s);
    });
    node.selectAll("circle").transition().duration(300)
        .attr("opacity", nd => connected.has(nd.id) ? 1 : 0.06);
    node.selectAll("text").transition().duration(300)
        .attr("opacity", nd => connected.has(nd.id) ? 1 : 0.06);
    link.transition().duration(300)
        .attr("stroke-opacity", l => {
            const s = l.source.id || l.source, t = l.target.id || l.target;
            return (connected.has(s) && connected.has(t)) ? 0.9 : 0.02;
        })
        .attr("stroke-width", l => {
            const s = l.source.id || l.source, t = l.target.id || l.target;
            return (connected.has(s) && connected.has(t)) ? 3 : 0.5;
        });
    linkLabel.transition().duration(300)
        .attr("opacity", l => {
            const s = l.source.id || l.source, t = l.target.id || l.target;
            return (connected.has(s) && connected.has(t)) ? 1 : 0;
        });
}
function resetHighlight() {
    node.selectAll("circle").transition().duration(300).attr("opacity", 1);
    node.selectAll("text").transition().duration(300).attr("opacity", 1);
    link.transition().duration(300).attr("stroke-opacity", 0.6).attr("stroke-width", 1.5);
    linkLabel.transition().duration(300).attr("opacity", 0.7);
}
function restoreAll() {
    resetZoom();
    resetHighlight();
    filterGen('all');
}

// Click background (anywhere outside nodes/buttons) to restore
document.addEventListener('click', function(e) {
    if (e.target.tagName === 'svg' || e.target.tagName === 'body' || e.target.id === 'graph') {
        restoreAll();
    }
});
</script>
</body>
